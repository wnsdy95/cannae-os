<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700" role="img" aria-labelledby="title desc">
  <title id="title">Cannae OS meme-style AI command post banner</title>
  <desc id="desc">A funny original comic banner showing a human commander routing overwhelmed AI agents through orders, evidence, validation, and after-action review.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1d2e"/>
      <stop offset="0.58" stop-color="#1d3442"/>
      <stop offset="1" stop-color="#2d3f30"/>
    </linearGradient>
    <linearGradient id="table" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38505b"/>
      <stop offset="1" stop-color="#1b2934"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 900 84px Arial, Helvetica, sans-serif; fill: #f5f0dd; letter-spacing: 0; }
      .subtitle { font: 700 28px Arial, Helvetica, sans-serif; fill: #cbd6dd; letter-spacing: 0; }
      .label { font: 800 25px Arial, Helvetica, sans-serif; fill: #17222c; letter-spacing: 0; }
      .small { font: 700 22px Arial, Helvetica, sans-serif; fill: #f5f0dd; letter-spacing: 0; }
      .tiny { font: 700 17px Arial, Helvetica, sans-serif; fill: #17222c; letter-spacing: 0; }
      .boardText { font: 800 24px Arial, Helvetica, sans-serif; fill: #dce8eb; letter-spacing: 0; }
      .paperText { font: 800 20px Arial, Helvetica, sans-serif; fill: #24313a; letter-spacing: 0; }
      .meme { font: 900 31px Arial, Helvetica, sans-serif; fill: #fff9e6; letter-spacing: 0; }
      .outline { stroke: #101820; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #101820; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1600" height="700" fill="url(#bg)"/>

  <circle cx="136" cy="120" r="148" fill="#ffb84d" opacity="0.13"/>
  <circle cx="1468" cy="575" r="176" fill="#4fa6ff" opacity="0.12"/>
  <path d="M0 594 C210 528 352 663 555 590 C749 520 858 575 1032 616 C1226 663 1398 570 1600 622 L1600 700 L0 700 Z" fill="#07111b" opacity="0.55"/>

  <g transform="translate(88 72)">
    <text class="title" x="0" y="72">Cannae OS</text>
    <text class="subtitle" x="4" y="116">when the user says: "just let the agents cook"</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="500" width="1456" height="118" rx="34" fill="url(#table)" class="outline"/>
    <ellipse cx="800" cy="502" rx="690" ry="72" fill="#4b6570" class="outline"/>
    <ellipse cx="800" cy="496" rx="630" ry="47" fill="#31464f"/>
  </g>

  <g transform="translate(1110 72)" filter="url(#shadow)">
    <rect x="0" y="0" width="390" height="232" rx="20" fill="#142330" class="outline"/>
    <rect x="24" y="24" width="342" height="184" rx="12" fill="#203843" stroke="#5d7b83" stroke-width="4"/>
    <text class="boardText" x="48" y="67">MISSION BOARD</text>
    <path d="M54 94 H312" stroke="#7cb7ad" stroke-width="5" stroke-linecap="round"/>
    <text class="small" x="48" y="132">intent -> orders</text>
    <text class="small" x="48" y="166">evidence -> validate</text>
    <text class="small" x="48" y="200">release -> AAR</text>
  </g>

  <g transform="translate(1145 334)" filter="url(#shadow)">
    <rect x="0" y="0" width="304" height="84" rx="20" fill="#ff644d" class="outline"/>
    <circle cx="46" cy="42" r="23" fill="#fff2d2" class="thin"/>
    <path d="M46 24 V44 L61 55" stroke="#17222c" stroke-width="6" stroke-linecap="round"/>
    <text class="label" x="88" y="52">SCOPE CREEP</text>
  </g>

  <g transform="translate(606 195)" filter="url(#shadow)">
    <path d="M76 240 C56 184 64 105 114 70 C151 44 204 46 239 76 C292 121 297 205 276 250 Z" fill="#f0bc75" class="outline"/>
    <circle cx="176" cy="58" r="46" fill="#f7ca87" class="outline"/>
    <path d="M137 57 C150 37 205 33 221 59" fill="none" stroke="#101820" stroke-width="8" stroke-linecap="round"/>
    <circle cx="160" cy="60" r="5" fill="#101820"/>
    <circle cx="196" cy="60" r="5" fill="#101820"/>
    <path d="M160 86 C174 96 192 96 207 86" fill="none" stroke="#101820" stroke-width="5" stroke-linecap="round"/>
    <rect x="89" y="129" width="178" height="146" rx="24" fill="#344f3d" class="outline"/>
    <rect x="123" y="140" width="110" height="38" rx="10" fill="#f5f0dd" class="thin"/>
    <text class="tiny" x="145" y="166">USER</text>
    <path d="M78 163 L18 212" stroke="#f0bc75" stroke-width="24" stroke-linecap="round"/>
    <path d="M273 164 L352 110" stroke="#f0bc75" stroke-width="24" stroke-linecap="round"/>
    <path d="M333 98 L392 88" stroke="#f5f0dd" stroke-width="14" stroke-linecap="round"/>
    <path d="M352 110 L402 141" stroke="#f5f0dd" stroke-width="14" stroke-linecap="round"/>
  </g>

  <g transform="translate(190 310)" filter="url(#shadow)">
    <rect x="0" y="52" width="208" height="138" rx="30" fill="#d9f2ff" class="outline"/>
    <rect x="38" y="0" width="132" height="86" rx="30" fill="#7ed0f2" class="outline"/>
    <circle cx="79" cy="43" r="11" fill="#101820"/>
    <circle cx="130" cy="43" r="11" fill="#101820"/>
    <path d="M82 65 C100 75 116 75 131 65" fill="none" stroke="#101820" stroke-width="5" stroke-linecap="round"/>
    <rect x="34" y="94" width="140" height="44" rx="10" fill="#f5f0dd" class="thin"/>
    <text class="tiny" x="57" y="123">S3 OPS</text>
    <path d="M183 101 L260 54" stroke="#d9f2ff" stroke-width="18" stroke-linecap="round"/>
    <rect x="232" y="21" width="164" height="70" rx="14" fill="#ffcf5c" class="outline"/>
    <text class="label" x="255" y="65">ROUTED</text>
  </g>

  <g transform="translate(393 370)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="155" rx="18" fill="#f8f2df" class="outline"/>
    <text class="paperText" x="25" y="43">CONTEXT</text>
    <text class="paperText" x="25" y="77">CONTEXT</text>
    <text class="paperText" x="25" y="111">MORE CONTEXT</text>
    <rect x="57" y="101" width="136" height="94" rx="25" fill="#d9f2ff" class="outline"/>
    <rect x="86" y="62" width="78" height="54" rx="18" fill="#7ed0f2" class="outline"/>
    <circle cx="109" cy="88" r="6" fill="#101820"/>
    <circle cx="140" cy="88" r="6" fill="#101820"/>
    <path d="M108 103 C122 97 133 97 144 103" fill="none" stroke="#101820" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(902 314)" filter="url(#shadow)">
    <rect x="0" y="64" width="202" height="136" rx="30" fill="#e2f4dc" class="outline"/>
    <rect x="36" y="7" width="130" height="86" rx="30" fill="#96d986" class="outline"/>
    <circle cx="78" cy="50" r="10" fill="#101820"/>
    <circle cx="126" cy="50" r="10" fill="#101820"/>
    <path d="M77 72 C92 82 112 82 128 72" fill="none" stroke="#101820" stroke-width="5" stroke-linecap="round"/>
    <rect x="33" y="110" width="138" height="44" rx="10" fill="#f5f0dd" class="thin"/>
    <text class="tiny" x="58" y="139">S2 FACTS</text>
    <path d="M28 111 L-60 80" stroke="#e2f4dc" stroke-width="18" stroke-linecap="round"/>
    <path d="M170 112 L255 75" stroke="#e2f4dc" stroke-width="18" stroke-linecap="round"/>
    <rect x="-122" y="39" width="98" height="58" rx="12" fill="#fff2d2" class="outline"/>
    <text class="tiny" x="-104" y="74">SOURCE?</text>
  </g>

  <g transform="translate(1208 468)" filter="url(#shadow)">
    <rect x="0" y="0" width="198" height="86" rx="18" fill="#f5f0dd" class="outline"/>
    <text class="paperText" x="32" y="35">AAR</text>
    <text class="paperText" x="32" y="65">after chaos</text>
    <circle cx="160" cy="43" r="18" fill="#ffcf5c" class="thin"/>
    <path d="M151 43 L158 51 L172 34" fill="none" stroke="#17222c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(104 214)" filter="url(#shadow)">
    <rect x="0" y="0" width="384" height="82" rx="22" fill="#17222c" class="outline"/>
    <text class="meme" x="29" y="51">UNAUTHORIZED AUTONOMY?</text>
  </g>

  <g transform="translate(1042 565)">
    <text class="small" x="0" y="0">hallucination containment unit: deployed</text>
  </g>
</svg>
